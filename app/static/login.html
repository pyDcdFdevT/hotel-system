<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel · Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
    <div class="bg-gradient-to-br from-blue-700 to-slate-900 text-white p-6">
      <h1 class="text-2xl font-bold">Hotel · Acceso</h1>
      <p class="text-sm opacity-80">Ingrese el PIN del personal</p>
    </div>
    <form id="form-login" class="p-6 space-y-4">
      <div>
        <label class="text-xs uppercase text-slate-500" for="pin">PIN</label>
        <input
          id="pin"
          name="pin"
          type="password"
          inputmode="numeric"
          autocomplete="off"
          maxlength="12"
          required
          class="w-full border rounded-lg px-3 py-3 mt-1 text-center text-2xl tracking-[0.6em] focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="grid grid-cols-3 gap-2" id="numpad"></div>

      <button id="btn-login" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold">
        Entrar
      </button>
      <p id="error" class="text-red-600 text-sm text-center hidden"></p>
    </form>
  </div>

  <script type="module">
    import { setToken, setUsuario } from "/static/js/api.js";

    const pinInput = document.getElementById("pin");
    const numpad = document.getElementById("numpad");
    const errorEl = document.getElementById("error");

    // Numpad táctil para tablets/celulares.
    const keys = ["1","2","3","4","5","6","7","8","9","C","0","⌫"];
    numpad.innerHTML = keys.map(
      (k) => `<button type="button" data-k="${k}" class="py-3 text-lg font-semibold border rounded-lg bg-slate-50 hover:bg-slate-200">${k}</button>`,
    ).join("");
    numpad.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-k]");
      if (!btn) return;
      const k = btn.dataset.k;
      if (k === "C") pinInput.value = "";
      else if (k === "⌫") pinInput.value = pinInput.value.slice(0, -1);
      else if (pinInput.value.length < 12) pinInput.value += k;
    });

    document.getElementById("form-login").addEventListener("submit", async (event) => {
      event.preventDefault();
      errorEl.classList.add("hidden");
      const pin = pinInput.value;
      if (!pin || pin.length < 3) {
        errorEl.textContent = "El PIN debe tener al menos 3 dígitos.";
        errorEl.classList.remove("hidden");
        return;
      }
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pin }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          errorEl.textContent = body.detail || "PIN incorrecto";
          errorEl.classList.remove("hidden");
          pinInput.value = "";
          return;
        }
        const data = await res.json();
        setToken(data.token);
        setUsuario(data.usuario);
        if (data.usuario.rol === "cocina" || data.usuario.rol === "barra") {
          window.location.href = "/cocina.html";
        } else {
          window.location.href = "/";
        }
      } catch (err) {
        errorEl.textContent = err.message || "Error de conexión";
        errorEl.classList.remove("hidden");
      }
    });

    pinInput.focus();
  </script>
</body>
</html>
