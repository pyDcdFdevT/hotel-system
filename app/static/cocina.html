<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel · Cocina</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body { background: #0f172a; color: #f8fafc; }
    .ticket { background: #ffffff; color: #0f172a; }
    .ticket.bar { border-left: 8px solid #2563eb; }
    .ticket.cocina { border-left: 8px solid #16a34a; }
    .ticket.piscina { border-left: 8px solid #0891b2; }

    .detalle-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: center;
      padding: 0.45rem 0;
      border-bottom: 1px dashed #cbd5e1;
    }
    .detalle-row:last-child { border-bottom: none; }
    .detalle-row.estado-listo { opacity: 0.55; }
    .detalle-estado {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 9999px;
      font-weight: 600;
    }
    .badge-pendiente { background: #fde68a; color: #92400e; }
    .badge-en_preparacion { background: #fdba74; color: #9a3412; }
    .badge-listo { background: #bbf7d0; color: #166534; }
    .btn-cocina {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.35rem 0.65rem;
      border-radius: 0.4rem;
      color: #ffffff;
    }
    .btn-iniciar { background: #f59e0b; }
    .btn-iniciar:hover { background: #d97706; }
    .btn-listo { background: #16a34a; }
    .btn-listo:hover { background: #15803d; }
  </style>
</head>
<body class="min-h-screen">
  <header class="bg-slate-900/80 backdrop-blur sticky top-0 z-10 border-b border-slate-700">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">🍳 Pedidos · Cocina &amp; Bar</h1>
        <p class="text-xs opacity-70" id="cocina-info"></p>
      </div>
      <div class="flex items-center gap-3">
        <span id="cocina-resumen" class="text-xs opacity-80"></span>
        <span id="cocina-hora" class="text-xs opacity-70"></span>
        <button id="btn-logout" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm">Salir</button>
      </div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-4">
    <div id="pedidos-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <p id="vacio" class="text-center opacity-60 mt-12 hidden">No hay pedidos pendientes 🎉</p>
  </main>

  <script type="module" src="/static/js/cocina.js"></script>
</body>
</html>
